<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">
  <title>PolicyAlpha</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f5f1;
      color: #162018;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(440px, 100%);
      padding: 28px;
      border: 1px solid #d8ded7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 42px rgb(20 35 24 / 8%);
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .mark {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 8px;
      background: #142219;
      color: #fff;
      font-weight: 800;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }
    p {
      margin: 8px 0 0;
      color: #5d6b60;
      line-height: 1.6;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0;
      font-weight: 650;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #c9d2ca;
      border-top-color: #1c6f42;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    button {
      display: none;
      width: 100%;
      margin-top: 16px;
      padding: 12px 16px;
      border: 0;
      border-radius: 6px;
      background: #142219;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="mark">PA</div>
      <div>
        <h1>PolicyAlpha</h1>
        <p>政策研究智能体</p>
      </div>
    </header>
    <div class="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span id="status-text">正在连接研究服务...</span>
    </div>
    <p id="detail">入口地址保持不变，系统正在寻找当前可用的研究节点。</p>
    <button id="retry" type="button">重新连接</button>
  </main>
  <script>
    const statusText = document.querySelector("#status-text");
    const detail = document.querySelector("#detail");
    const retry = document.querySelector("#retry");

    async function connect() {
      retry.classList.remove("visible");
      statusText.textContent = "正在连接研究服务...";
      detail.textContent = "入口地址保持不变，系统正在寻找当前可用的研究节点。";

      try {
        const response = await fetch(`target.json?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`配置读取失败：${response.status}`);
        const target = await response.json();
        if (!/^https:\/\/[a-z0-9.-]+(?:\/.*)?$/i.test(target.url || "")) {
          throw new Error("研究服务地址无效");
        }
        statusText.textContent = "连接成功，正在进入...";
        window.location.replace(target.url);
      } catch (error) {
        statusText.textContent = "研究服务暂时不可达";
        detail.textContent = "请稍后重试。若本机正在重连公网节点，通常一分钟内会自动恢复。";
        retry.classList.add("visible");
      }
    }

    retry.addEventListener("click", connect);
    connect();
  </script>
</body>
</html>
